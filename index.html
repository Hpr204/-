<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 HUB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
        }
        .wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        h1 {
            color: #ffd700;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
        }
        .user-info {
            color: #ffd700;
        }
        .hero {
            text-align: center;
            padding: 60px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 30px;
        }
        .hero h2 {
            font-size: 48px;
            color: #ffd700;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        .card {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        .comment-section {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 10px;
            margin: 30px 0;
        }
        .comment {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        .comment-author {
            color: #ffd700;
            font-weight: bold;
        }
        .comment-date {
            color: #888;
            font-size: 12px;
            margin-left: 10px;
        }
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #0f3460;
            border: 1px solid #ffd700;
            color: white;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            background: #ffd700;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-top: 30px;
        }
        .register-link {
            background: #ffd700;
            color: #1a1a2e !important;
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
        }
        .register-link:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <h1>🎯 CS2 HUB</h1>
            <nav>
                <a href="#">Новости</a>
                <a href="#">Гайды</a>
                <a href="#">Скины</a>
                <a href="#">Турниры</a>
                <span id="userDisplay" class="user-info"></span>
            </nav>
        </header>

        <div class="hero">
            <h2>Counter-Strike 2</h2>
            <p>Добро пожаловать на главный портал по CS2!</p>
        </div>

        <div class="cards">
            <div class="card">🔥 Новости CS2</div>
            <div class="card">📚 Гайды</div>
            <div class="card">🔫 Скины</div>
            <div class="card">🏆 Турниры</div>
        </div>

        <div class="comment-section">
            <h2 style="color: #ffd700; margin-bottom: 20px;">Комментарии</h2>
            
            <div id="commentsList">
                <!-- Комментарии будут загружаться сюда -->
            </div>

            <div id="commentForm" style="display: none;">
                <h3>Оставить комментарий</h3>
                <textarea id="commentText" placeholder="Ваш комментарий..." rows="3"></textarea>
                <button onclick="addComment()">Отправить</button>
            </div>
        </div>

        <footer>
            © 2026 CS2 HUB
        </footer>
    </div>

    <script>
        // Проверяем, залогинен ли пользователь
        const currentUser = localStorage.getItem('cs2user');
        
        // Показываем имя пользователя или кнопку регистрации
        const userDisplay = document.getElementById('userDisplay');
        if (currentUser) {
            userDisplay.innerHTML = `👋 ${currentUser}`;
            document.getElementById('commentForm').style.display = 'block';
        } else {
            // ИСПРАВЛЕННАЯ ССЫЛКА НА РЕГИСТРАЦИЮ
            userDisplay.innerHTML = '<a href="https://hpr204.github.io/registrycshubcs2/" class="register-link">Регистрация</a>';
        }

        // Загружаем комментарии из localStorage (для простоты)
        let comments = JSON.parse(localStorage.getItem('comments')) || [];

        function showComments() {
            const list = document.getElementById('commentsList');
            if (comments.length === 0) {
                list.innerHTML = '<p style="color:#888;">Пока нет комментариев</p>';
            } else {
                list.innerHTML = comments.map(comment => `
                    <div class="comment">
                        <span class="comment-author">${comment.author}</span>
                        <span class="comment-date">${comment.date}</span>
                        <p>${comment.text}</p>
                    </div>
                `).join('');
            }
        }

        function addComment() {
            const text = document.getElementById('commentText').value.trim();
            if (!text) return alert('Напишите комментарий!');

            comments.unshift({
                author: currentUser,
                text: text,
                date: new Date().toLocaleString()
            });

            localStorage.setItem('comments', JSON.stringify(comments));
            document.getElementById('commentText').value = '';
            showComments();
        }

        showComments();
    </script>
</body>
</html>
